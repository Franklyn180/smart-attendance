name: Automated GitOps Smart Attendance Portal Deployment

# TODO: Add DOCKERHUB_ACCESS_TOKEN and DOCKERHUB_USERNAME to secrets for pushing built images
# TODO: Update docker-compose.yml to pull from DockerHub instead of building locally on the EC2 instance for faster deployments and better CI/CD separation of concerns

on:
  push:
    branches:
      - main

env:
  AWS_REGION: "us-east-1" # Update to your target AWS region
  AWS_SECURITY_GROUP_ID: ${{ secrets.AWS_SECURITY_GROUP_ID }}
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
  PORTAL_APP_PORT: "80" # Routed via Nginx reverse proxy
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_TAG: "latest"

jobs:
  # -------------------------------------------------------------------------
  # CONTINUOUS INTEGRATION, LINTING, AND SIMULATED TESTING
  # -------------------------------------------------------------------------
  continuous-integration:
    name: CI Pipeline (Lint -> Tests -> Build & Push)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Dependencies & Run Tests
        run: |
          # All tests

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: | 
            ${{ secrets.DOCKERHUB_USERNAME }}/attendance-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/attendance-backend:${{ env.IMAGE_TAG }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: | 
            ${{ secrets.DOCKERHUB_USERNAME }}/attendance-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/attendance-frontend:${{ env.IMAGE_TAG }}

  # -------------------------------------------------------------------------
  # SECURE, FIREWALL-AUTOMATED CONTINUOUS DELIVERY
  # -------------------------------------------------------------------------
  continuous-delivery:
    name: CD Pipeline (Dynamic Whitelisting -> Secure Deply -> Validation -> Rollback)
    needs: continuous-integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all tags for target-side rollback mechanisms

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Runner Temporary IP Address
        id: get-ip
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "RUNNER_IP=${RUNNER_IP}" >> $GITHUB_ENV
          echo "Runner host IP captured: ${RUNNER_IP}"

      - name: Dynamic AWS Firewall Whitelisting (Authorize Entry)
        run: |
          echo "Opening transient SSH access for runner IP..."
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ env.AWS_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ env.RUNNER_IP }}/32

      - name: Setup SSH Keys
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Zero-Downtime Deployment via SSH Tunnel
        run: |
          ssh -o StrictHostKeyChecking=no ${{ env.EC2_USERNAME }}@${{ env.EC2_HOST }} "
            cd /home/${{ env.EC2_USERNAME }}/app &&
            git fetch --all &&
            git checkout main &&
            git pull origin main &&
            docker-compose pull &&
            docker-compose up -d
          "

      - name: Post-Deployment Health Validation (30s Loop)
        id: validation-loop
        run: |
          echo "Starting health check validation"
          
          TIMEOUT=30
          INTERVAL=3
          ELAPSED=0

          while [ $ELAPSED -lt $TIMEOUT ]; do
            # Querying the Live Nginx Endpoint mapped to /health
            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://${{ env.EC2_HOST }}:${{ env.PORTAL_APP_PORT }}/health || echo "000")
            
            if [ "$STATUS_CODE" = "200" ]; then
              echo "✅ Health check passed - Application is healthy."
              exit 0
            fi
            
            echo "⏳ Health check failed with status code $STATUS_CODE. Retrying in ${INTERVAL}s seconds... (${ELAPSED}/${TIMEOUT})"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "❌ Health check failed after ${TIMEOUT}s"
          exit 1

      # -------------------------------------------------------------------------
      # TARGET-SIDE AUTOMATED FALLBACK (TRIGGERED ONLY IF VALIDATION FAILS)
      # -------------------------------------------------------------------------
      - name: Automated Rollback on Failure
        if: failure() && steps.validation-loop.outcome == 'failure'
        run: |
          echo "🚨 Deployment validation failed - Initializing automated rollback..."
          
          PREVIOUS_STABLE_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "HEAD^")
          echo "Identified target rollback reference: ${PREVIOUS_STABLE_TAG}"

          echo "Executing target-side rollback over SSH..."
          ssh -o StrictHostKeyChecking=no ${{ env.EC2_USERNAME }}@${{ env.EC2_HOST }} "
            cd /home/${{ env.EC2_USERNAME }}/app &&
            git checkout ${PREVIOUS_STABLE_TAG} &&
            docker-compose pull &&
            docker-compose up -d
          "
          echo "✅ Rollback to ${PREVIOUS_STABLE_TAG} completed."

      # -------------------------------------------------------------------------
      # POST-DEPLOYMENT SECURE CLEANUP (ALWAYS RUNS TO PREVENT DRIFT / DISK LEAKS)
      # -------------------------------------------------------------------------
      - name: Cleanup - Revoke Firewall Access & Trigger Host Garbage Collection
        if: always()
        run: |
          echo "Revoking temporary firewall rule..."
          if [ ! -z "${{ env.RUNNER_IP }}" ]; then
            aws ec2 revoke-security-group-ingress \
              --group-id ${{ env.AWS_SECURITY_GROUP_ID }} \
              --protocol tcp \
              --port 22 \
              --cidr ${{ env.RUNNER_IP }}/32
          fi

          echo "Running container garbage collection on host..."
          ssh -o StrictHostKeyChecking=no ${{ env.EC2_USERNAME }}@${{ env.EC2_HOST }} 
          " docker system prune -f " || true